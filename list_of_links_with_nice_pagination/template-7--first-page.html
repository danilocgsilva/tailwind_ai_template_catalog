<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Links List</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    /* Remove number input arrows */
    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    input[type=number] {
      -moz-appearance: textfield;
    }
  </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-7xl bg-white shadow-lg rounded-2xl p-6">
    <h1 class="text-2xl font-bold mb-6 text-gray-800">Useful Links</h1>

    <!-- Links List (example static items) -->
    <ul class="space-y-3">
      <li>
        <a href="#" class="block p-4 rounded-xl border hover:bg-gray-50 transition">
          <span class="text-blue-600 font-medium">Link 1</span>
        </a>
      </li>
      <li>
        <a href="#" class="block p-4 rounded-xl border hover:bg-gray-50 transition">
          <span class="text-blue-600 font-medium">Link 2</span>
        </a>
      </li>
      <li>
        <a href="#" class="block p-4 rounded-xl border hover:bg-gray-50 transition">
          <span class="text-blue-600 font-medium">Link 3</span>
        </a>
      </li>
    </ul>

    <!-- Pagination Row -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mt-6">
      <!-- Centered Pagination -->
      <div class="flex-1 flex justify-center">
        <div class="flex items-center space-x-1">

          <!-- Previous (disabled on first page) -->
          <span class="px-3 py-1 rounded-lg border text-sm opacity-50 cursor-not-allowed">&laquo;</span>

          <!-- First page (active) -->
          <a href="?page=1" class="px-3 py-1 rounded-lg border text-sm bg-blue-600 text-white">1</a>

          <!-- Nearby pages -->
          <a href="?page=2" class="px-3 py-1 rounded-lg border text-sm bg-white hover:bg-gray-100">2</a>
          <a href="?page=3" class="px-3 py-1 rounded-lg border text-sm bg-white hover:bg-gray-100">3</a>

          <!-- Ellipsis -->
          <span class="px-2 text-gray-400">...</span>

          <!-- Last page -->
          <a href="?page=20" class="px-3 py-1 rounded-lg border text-sm bg-white hover:bg-gray-100">20</a>

          <!-- Next -->
          <a href="?page=2" class="px-3 py-1 rounded-lg border text-sm bg-white hover:bg-gray-100">&raquo;</a>

        </div>
      </div>

      <!-- Go to page -->
      <form action="" method="GET" class="relative flex justify-center sm:justify-end">
        <input
          type="number"
          name="page"
          min="1"
          placeholder="#"
          class="w-20 pr-8 pl-2 py-1 border rounded-lg focus:outline-none focus:ring focus:ring-blue-200"
        />
        <button
          type="submit"
          class="absolute right-1 top-1/2 -translate-y-1/2 text-gray-500 hover:text-blue-600"
          title="Go"
        >
          ➤
        </button>
      </form>
    </div>
  </div>

</body>
</html>
